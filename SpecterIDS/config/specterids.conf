# SpecterIDS runtime configuration.
# CLI arguments override values from this file.

interface=eth0
# Optional offline input. CLI --pcap overrides live capture.
# pcap_file=samples/example.pcap
pcap_replay=false
pcap_speed=1x
benchmark_mode=false
log_dir=logs
rules_file=rules/default.rules
json_logs=true
dashboard=false
verbose=false
quiet=false
bpf_filter=ip or ip6 or arp
workers=2
detection_shards=16
queue_size=1024
memory_limit_mb=256
output_mode=text
rotation_size_mb=32
log_level=INFO
# whitelist=198.51.100.10
# blacklist=203.0.113.99
sensitive_ports=22,23,445,3389,5900,8080
dashboard_refresh_ms=1000
dashboard_mode=detailed
no_color=false
pcap_export=false
capture_dir=captures
reports_dir=reports
compress_logs=false
suspicious_context_packets=8
snaplen=4096
metrics_enabled=false
metrics_port=9090
sqlite_enabled=false
sqlite_path=data/specterids.db
plugins_enabled=false
plugin_dir=plugins
# plugin=plugins/libspecter_portscan.so
beaconing_min_hits=8
beaconing_interval=30
beaconing_tolerance=3
beaconing_ignore_private=true
beaconing_whitelist=8.8.8.8,1.1.1.1
